networks:
  PasteBinNet:

services:
  postgres:
    image: postgres:16
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      PasteBinNet:

  cache:
    image: redis:8.6-alpine
    restart: always
    ports:
      - "${REDIS_CACHE_PORT}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_CACHE_PASSWORD}
      --maxmemory-policy allkeys-lfu
      --maxmemory 100mb
    networks:
      PasteBinNet:

  rate:
    image: redis:8.6-alpine
    restart: always
    ports:
      - "${REDIS_RATE_PORT}:${REDIS_RATE_PORT}"
    command: >
      redis-server
      --requirepass ${REDIS_RATE_PASSWORD}
      --port ${REDIS_RATE_PORT}
    networks:
      PasteBinNet:

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - cache
      - rate
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    networks:
      PasteBinNet: